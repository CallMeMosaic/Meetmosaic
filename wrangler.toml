# wrangler.toml
name = 'meet'
main = "src/worker.ts"
compatibility_date = "2026-06-24"

workers_dev = true

[assets]
directory = "./build"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
